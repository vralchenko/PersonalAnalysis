<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Analysis — Generational Psychology Profile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121f;
    --border: #1e1e35;
    --accent: #7c5cfc;
    --accent2: #a78bfa;
    --text: #e8e6f0;
    --muted: #8888a8;
    --success: #34d399;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 10px 20px; flex: 1; display: flex; flex-direction: column; }

  header {
    text-align: center;
    padding: 20px 20px 10px;
  }
  header h1 {
    font-size: 1.8em;
    background: linear-gradient(135deg, var(--accent), var(--accent2), #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  header p { color: var(--muted); font-size: 0.9em; }

  /* Form */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 28px;
    margin-bottom: 16px;
  }
  .form-row { display: flex; gap: 12px; margin-bottom: 10px; }
  .form-group { flex: 1; position: relative; }
  .form-group label {
    display: block;
    font-size: 0.85em;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input, textarea {
    width: 100%;
    padding: 10px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1em;
    font-family: inherit;
    transition: border 0.3s;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 40px; }

  .btn-generate {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 6px;
  }
  .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,92,252,0.3); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Sections nav */
  .sections-nav {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 14px;
  }
  .nav-btn {
    padding: 8px 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 0.82em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--text); }
  .nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .nav-btn.done { border-color: var(--success); color: var(--success); }
  .nav-btn .icon { font-size: 1.4em; display: block; margin-bottom: 4px; }

  /* Results */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    display: none;
  }
  .result-card.visible { display: block; }
  .result-card h2 {
    color: var(--accent2);
    font-size: 1.3em;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .result-content {
    white-space: pre-wrap;
    line-height: 1.8;
  }
  .result-content p { margin-bottom: 12px; }

  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    padding: 20px 0;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-all {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #059669, #10b981);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.95em;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.3s;
  }
  .btn-all:hover { transform: translateY(-2px); }
  .btn-all:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-pdf {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #dc2626, #ef4444);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.95em;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 16px;
    transition: all 0.3s;
    display: none;
  }
  .btn-pdf:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(220,38,38,0.3); }
  .btn-pdf:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  #placeDropdown .dropdown-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 0.95em;
    color: var(--text);
    border-bottom: 1px solid var(--border);
  }
  #placeDropdown .dropdown-item:last-child { border-bottom: none; }
  #placeDropdown .dropdown-item:hover { background: rgba(124,92,252,0.15); }

  .footer {
    text-align: center;
    padding: 14px;
    margin-top: auto;
    color: var(--muted);
    font-size: 0.85em;
  }
  .footer a { color: var(--accent2); text-decoration: none; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.6em; }
    .form-row { flex-direction: column; gap: 12px; }
    .sections-nav { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <h1>Personal Analysis</h1>
  <p>Generational psychology profile based on your birth date and place</p>
</header>

<div class="container">
  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>Birth Date</label>
        <input type="date" id="birthDate">
      </div>
      <div class="form-group">
        <label>Birth Place</label>
        <input type="text" id="birthPlace" placeholder="e.g. Chernihiv, Ukraine" autocomplete="off">
        <div id="placeDropdown" style="display:none; position:absolute; z-index:100; background:var(--card); border:1px solid var(--border); border-radius:10px; width:100%; max-height:200px; overflow-y:auto; margin-top:2px;"></div>
      </div>
    </div>
    <div class="form-group" style="margin-bottom: 8px;">
      <label>Additional Context (optional)</label>
      <textarea id="extraInfo" placeholder="Parents background, siblings, family status, anything relevant..."></textarea>
    </div>
    <button class="btn-generate" id="btnGenerate" onclick="generateSection()">Generate Selected Analysis</button>
    <button class="btn-all" id="btnAll" onclick="generateAll()">Generate Full Report (all 7 sections)</button>
  </div>

  <div class="sections-nav" id="sectionsNav">
    <div class="nav-btn active" data-section="childhood" onclick="selectSection(this)">
      <span class="icon">�</span>Childhood
    </div>
    <div class="nav-btn" data-section="personality" onclick="selectSection(this)">
      <span class="icon">꩜</span>Personality
    </div>
    <div class="nav-btn" data-section="career" onclick="selectSection(this)">
      <span class="icon">⚡</span>Career
    </div>
    <div class="nav-btn" data-section="relationships" onclick="selectSection(this)">
      <span class="icon">♡</span>Relationships
    </div>
    <div class="nav-btn" data-section="money" onclick="selectSection(this)">
      <span class="icon">$</span>Money
    </div>
    <div class="nav-btn" data-section="struggles" onclick="selectSection(this)">
      <span class="icon">◉</span>Struggles
    </div>
    <div class="nav-btn" data-section="roadmap" onclick="selectSection(this)">
      <span class="icon">▷</span>Roadmap
    </div>
  </div>

  <button class="btn-pdf" id="btnPdf" onclick="downloadPDF()">📄 Download PDF</button>
  <div id="results"></div>

  <div class="footer">
    <p>Powered by generational psychology, sociology & economics. No astrology.</p>
    <p>Built by <a href="https://www.linkedin.com/in/victoralchenko/" target="_blank">Viktor Ralchenko</a> | <a href="https://vralchenko-portfolio.pages.dev/en/projects" target="_blank">Portfolio</a></p>
  </div>
</div>

<script>
// Place autocomplete
(function() {
  const input = document.getElementById('birthPlace');
  const dropdown = document.getElementById('placeDropdown');
  let timer = null;

  input.addEventListener('input', function() {
    clearTimeout(timer);
    const q = this.value.trim();
    if (q.length < 2) { dropdown.style.display = 'none'; return; }
    timer = setTimeout(async () => {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&addressdetails=1&limit=5&featuretype=city,town,village`);
        const data = await res.json();
        const items = [...new Set(data.map(item => {
          const city = item.address.city || item.address.town || item.address.village || '';
          const country = item.address.country || '';
          return city && country ? `${city}, ${country}` : item.display_name.split(',').slice(0, 2).join(',').trim();
        }).filter(Boolean))];
        if (items.length === 0) { dropdown.style.display = 'none'; return; }
        dropdown.innerHTML = items.map(i => `<div class="dropdown-item">${i}</div>`).join('');
        dropdown.style.display = 'block';
        dropdown.querySelectorAll('.dropdown-item').forEach(el => {
          el.addEventListener('click', () => { input.value = el.textContent; dropdown.style.display = 'none'; });
        });
      } catch(e) { dropdown.style.display = 'none'; }
    }, 400);
  });

  document.addEventListener('click', function(e) {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) dropdown.style.display = 'none';
  });
})();

const SECTIONS = {
  childhood: 'Childhood Context Decoder',
  personality: 'Personality Evolution Map',
  career: 'Career Compass',
  relationships: 'Relationship Pattern Scan',
  money: 'Money Mindset Matrix',
  struggles: 'Hidden Struggle Finder',
  roadmap: 'Life Roadmap'
};

let currentSection = 'childhood';
const results = {};

function selectSection(el) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentSection = el.dataset.section;
  // Hide all cards, show only the selected one
  document.querySelectorAll('.result-card').forEach(c => c.classList.remove('visible'));
  const card = document.getElementById(`result-${currentSection}`);
  if (card) card.classList.add('visible');
}

function showResults() {
  const container = document.getElementById('results');
  container.innerHTML = '';
  Object.keys(SECTIONS).forEach(key => {
    if (results[key]) {
      const card = document.createElement('div');
      card.className = 'result-card' + (key === currentSection ? ' visible' : '');
      card.innerHTML = `<h2>${SECTIONS[key]}</h2><div class="result-content">${formatText(results[key])}</div>`;
      container.appendChild(card);
    }
  });
  // Show current if exists
  const current = container.querySelector('.result-card.visible');
  if (!current) {
    const first = container.querySelector('.result-card');
    if (first) first.classList.add('visible');
  }
}

function formatText(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n- /g, '<br>• ')
    .replace(/\n(\d+)\./g, '<br>$1.')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

async function streamSection(section) {
  const birthDate = formatDate(document.getElementById('birthDate').value);
  const birthPlace = document.getElementById('birthPlace').value;
  const extraInfo = document.getElementById('extraInfo').value;

  if (!birthDate || !birthPlace) {
    alert('Please fill in birth date and place');
    return;
  }

  const container = document.getElementById('results');

  // Show loading
  let card = document.getElementById(`result-${section}`);
  if (!card) {
    card = document.createElement('div');
    card.id = `result-${section}`;
    card.className = 'result-card visible';
    container.appendChild(card);
  }
  card.className = 'result-card visible';
  card.innerHTML = `<h2>${SECTIONS[section]}</h2><div class="loading"><div class="spinner"></div>Analyzing...</div>`;

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ birthDate, birthPlace, section, extraInfo })
    });

    if (!res.ok) throw new Error(`API error: ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let text = '';
    let buffer = '';

    card.innerHTML = `<h2>${SECTIONS[section]}</h2><div class="result-content" id="content-${section}"></div>`;
    const contentEl = document.getElementById(`content-${section}`);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data: ')) continue;
        const data = trimmed.slice(6);
        if (data === '[DONE]') break;
        try {
          const parsed = JSON.parse(data);
          const content = parsed.choices?.[0]?.delta?.content || '';
          if (content) {
            text += content;
            contentEl.innerHTML = formatText(text);
          }
        } catch {}
      }
    }

    results[section] = text;
    showPdfButton();

    // Mark nav button as done
    const navBtn = document.querySelector(`.nav-btn[data-section="${section}"]`);
    if (navBtn) navBtn.classList.add('done');

  } catch (error) {
    card.innerHTML = `<h2>${SECTIONS[section]}</h2><p style="color:#ef4444;">Error: ${error.message}</p>`;
  }
}

async function generateSection() {
  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  btn.textContent = 'Generating...';
  // Hide all other result cards, show only the selected one
  document.querySelectorAll('.result-card').forEach(c => c.classList.remove('visible'));
  await streamSection(currentSection);
  btn.disabled = false;
  btn.textContent = 'Generate Selected Analysis';
}

async function generateAll() {
  const btn = document.getElementById('btnAll');
  const btnGen = document.getElementById('btnGenerate');
  btn.disabled = true;
  btnGen.disabled = true;
  btn.textContent = 'Generating full report...';

  for (const section of Object.keys(SECTIONS)) {
    currentSection = section;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.nav-btn[data-section="${section}"]`)?.classList.add('active');
    await streamSection(section);
  }

  btn.disabled = false;
  btnGen.disabled = false;
  btn.textContent = 'Generate Full Report (all 7 sections)';

  // Show all results
  document.querySelectorAll('.result-card').forEach(c => c.classList.add('visible'));
  document.getElementById('btnPdf').style.display = 'block';
}

function showPdfButton() {
  if (Object.keys(results).length > 0) {
    document.getElementById('btnPdf').style.display = 'block';
  }
}

async function downloadPDF() {
  const btn = document.getElementById('btnPdf');
  btn.disabled = true;
  btn.textContent = 'Generating PDF...';

  try {
    // Build a temporary container with all results for PDF
    const pdfContainer = document.createElement('div');
    pdfContainer.style.cssText = 'position:absolute;left:-9999px;top:0;width:800px;background:#ffffff;color:#1a1a1a;padding:50px;font-family:Inter,system-ui,sans-serif;line-height:1.8;';

    const birthDate = document.getElementById('birthDate').value;
    const birthPlace = document.getElementById('birthPlace').value;

    // Build all sections into one flow
    let sectionsHTML = '';
    Object.keys(SECTIONS).forEach(key => {
      if (results[key]) {
        sectionsHTML += `
          <div style="margin-bottom:28px;padding:24px;background:#f9f9fb;border:1px solid #e0e0e0;border-radius:10px;">
            <h2 style="color:#5b3cc4;font-size:1.3em;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #e0e0e0;">${SECTIONS[key]}</h2>
            <div style="white-space:pre-wrap;line-height:1.8;text-align:justify;color:#2a2a2a;">${formatText(results[key])}</div>
          </div>
        `;
      }
    });

    pdfContainer.innerHTML = `
      <div style="text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #e0e0e0;">
        <h1 style="color:#5b3cc4;font-size:2em;margin-bottom:10px;">Personal Analysis</h1>
        <p style="color:#666;">Birth: ${birthDate ? new Date(birthDate).toLocaleDateString('en-GB') : '—'} | ${birthPlace || '—'}</p>
      </div>
      ${sectionsHTML}
    `;

    document.body.appendChild(pdfContainer);

    const canvas = await html2canvas(pdfContainer, {
      scale: 2,
      backgroundColor: '#ffffff',
      logging: false,
      useCORS: true,
    });

    document.body.removeChild(pdfContainer);

    const jsPDFLib = window.jspdf || window.jsPDF;
    if (!jsPDFLib) throw new Error('jsPDF library not loaded');
    const { jsPDF } = jsPDFLib;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfPageHeight = pdf.internal.pageSize.getHeight();
    const margin = 10;
    const imgWidthMM = pdfWidth - margin * 2;
    const imgHeightMM = (canvas.height * imgWidthMM) / canvas.width;
    const usableHeight = pdfPageHeight - margin * 2;
    const pxPerMM = canvas.height / imgHeightMM;
    let srcY = 0;
    let page = 0;

    while (srcY < canvas.height) {
      if (page > 0) pdf.addPage();
      const sliceHeightPx = Math.min(usableHeight * pxPerMM, canvas.height - srcY);
      const sliceHeightMM = sliceHeightPx / pxPerMM;

      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = canvas.width;
      sliceCanvas.height = Math.ceil(sliceHeightPx);
      const ctx = sliceCanvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, sliceCanvas.width, sliceCanvas.height);
      ctx.drawImage(canvas, 0, srcY, canvas.width, sliceHeightPx, 0, 0, canvas.width, sliceHeightPx);

      pdf.addImage(sliceCanvas.toDataURL('image/png'), 'PNG', margin, margin, imgWidthMM, sliceHeightMM);
      srcY += sliceHeightPx;
      page++;
    }

    const dateStr = birthDate ? birthDate.replace(/-/g, '') : 'report';
    pdf.save(`personal-analysis-${dateStr}.pdf`);

  } catch (error) {
    console.error('PDF error:', error);
    alert('Failed to generate PDF: ' + error.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '📄 Download PDF';
  }
}
</script>

</body>
</html>
